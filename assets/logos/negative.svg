<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" role="img" aria-labelledby="t">
  <title id="t">AI Research Foundations — an A whose left stroke is an ascending staircase, its steps and counter carved as negative space from a solid tile</title>

  <!-- Solid deep-ink app tile: the single geometric form -->
  <rect x="0" y="0" width="256" height="256" rx="56" fill="#241539"/>

  <!-- LEFT stroke: a solid A-leg whose counter-facing edge is an ascending STAIRCASE.
       The treads and risers are the ink tile knocked out through the light A-mass. -->
  <polygon fill="#6B4CA6"
    points="40,210 96,46 114,46 114,72 100,72 100,98 86,98 86,124 72,124 72,150 66,210"/>

  <!-- RIGHT stroke: clean solid diagonal -->
  <polygon fill="#6B4CA6" points="142,46 164,46 216,210 194,210"/>

  <!-- Crossbar: encloses the triangular counter (negative space), fixes the A read -->
  <polygon fill="#6B4CA6" points="72,150 176,150 176,170 72,170"/>

  <!-- GOLD summit: apex keystone bridging both strokes — the top of the climb -->
  <polygon fill="#F6C63C" points="114,46 142,46 128,84"/>
</svg>
